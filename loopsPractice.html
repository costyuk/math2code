<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Easy Loop Practice</title>
  <style>
    /* Your Design Maintained */
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #333; text-align: center; margin: 0; padding: 10px; }
    .container { background: #ffffff; max-width: 860px; margin: 20px auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #dfe1e5; }
    h2 { color: #1a73e8; margin-bottom: 20px; }
    
    button { padding: 12px 20px; margin: 8px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .levelBtn { background: #1a73e8; color: white; width: 80%; max-width: 400px; }
    .levelBtn:hover { background: #1557b0; transform: translateY(-2px); }
    .locked { background: #dadce0; color: #70757a; cursor: not-allowed; }
    
    pre.code { 
        background: #000000; 
        color: #f8f8f2; 
        padding: 20px; 
        border-radius: 10px; 
        font-family: 'Consolas', 'Monaco', monospace; 
        font-size: 18px; 
        line-height: 1.6; 
        text-align: left; 
        margin: 20px auto; 
        max-width: 600px; 
        overflow-x: auto; 
        border: 2px solid #1a73e8;
    }
    .keyword { color: #ff79c6; } 
    .number { color: #bd93f9; }  
    .variable { color: #50fa7b; } 

    input[type="text"], input[type="password"] { padding: 12px; font-size: 18px; width: 200px; border: 2px solid #1a73e8; border-radius: 8px; background: #fff; color: #333; outline: none; }
    #feedback { font-size: 22px; font-weight: bold; margin: 15px 0; min-height: 30px; }
    
    .tf-btn { font-size: 20px; padding: 15px 45px; margin: 10px; }
    .tf-true { background: #2ecc71; color: white; }
    .tf-false { background: #e74c3c; color: white; }
    .next-btn { background: #1a73e8; color: white; }
    .back-btn { background: #5f6368; color: white; }
    #pinPanel { display:none; background:#f8f9fa; padding:20px; border-radius:10px; border: 1px dashed #1a73e8; margin-top:20px; }
  </style>
</head>
<body>

<div class="container">
  <h2>🔁 Loop Master: Grade 4</h2>

  <div id="levelSelect">
    <h3>Choose a Challenge</h3>
    <div id="btnContainer"></div>
    <p style="color:#70757a; font-size:14px; margin-top:15px;">Get 40 points to unlock the next level!</p>
    <button style="background:transparent; color:#1a73e8; font-size:12px;" onclick="showPin()">Teacher Login</button>
    <div id="pinPanel">
      <input id="pinInput" type="password" placeholder="PIN">
      <button class="levelBtn" style="width:auto" onclick="checkPin()">Unlock</button>
    </div>
  </div>

  <div id="quiz" style="display:none">
    <h3 id="levelTitle" style="color:#1a73e8"></h3>
    <div id="questionArea"></div>
    <div id="feedback"></div>
    <div style="font-size:18px; margin:10px;">Score: <span id="score" style="color:#1a73e8; font-weight:bold;">0</span> / 40 ⭐</div>
    <button class="next-btn" id="nextBtn" onclick="handleNextStep()" style="display:none">Next Question →</button><br>
    <button class="back-btn" onclick="goBack()">Exit</button>
  </div>
</div>

<script>
let level=1, score=0, answered=false, currentQ = null;
let unlockedLevels=[true,false,false,false];
const NAMES = ["True or False?", "Adding Up", "Nested Counting", "Giant Challenge"];

function highlight(code) {
  return code
    .replace(/\b(int|for|while|if|return)\b/g, '<span class="keyword">$1</span>')
    .replace(/\b(\d+)\b/g, '<span class="number">$1</span>')
    .replace(/\b(i|j|sum|n|count|total|x)\b/g, '<span class="variable">$1</span>');
}

function renderMenu() {
  const cont = document.getElementById("btnContainer");
  cont.innerHTML = "";
  for(let i=1; i<=4; i++) {
    const btn = document.createElement("button");
    const locked = !unlockedLevels[i-1];
    btn.className = "levelBtn" + (locked ? " locked" : "");
    btn.innerHTML = (locked ? "🔒 " : "") + "Level " + i + " — " + NAMES[i-1];
    btn.onclick = () => { if(!locked) startQuiz(i); };
    cont.appendChild(btn);
  }
}

function generateQ(l) {
  const r = (m) => Math.floor(Math.random() * m);
  if(l === 1) {
    let a = r(5)+2, b = r(4)+3, total = a*b, isT = Math.random() > 0.5;
    let disp = isT ? total : total + (r(2)?2:-2);
    return { type:'tf', code:`int total = 0;\nfor(int i=0; i<${a}; i++) {\n  total = total + ${b};\n}\n// Is total == ${disp}?`, ans:isT };
  } else if(l === 2) {
    let start = r(10), loops = r(4)+3, step = r(3)+2;
    return { type:'input', code:`int n = ${start};\nfor(int i=0; i<${loops}; i++) {\n  n = n + ${step};\n}\nreturn n;`, ans:(start+(loops*step)).toString() };
  } else if(l === 3) {
    let out = r(3)+2, inn = r(2)+2;
    return { type:'input', code:`int x = 0;\nfor(int i=0; i<${out}; i++) {\n  for(int j=0; j<${inn}; j++) {\n    x = x + 1;\n  }\n}\nreturn x;`, ans:(out*inn).toString() };
  } else {
    let x = r(15)+10, sub = r(3)+2;
    return { type:'input', code:`int x = ${x};\nwhile(x > 5) {\n  x = x - ${sub};\n}\nreturn x;`, ans:(x - (Math.ceil((x-5)/sub)*sub)).toString() };
  }
}

function startQuiz(l){
  level=l; score=0; 
  document.getElementById("score").innerText=0;
  document.getElementById("quiz").style.display="block";
  document.getElementById("levelSelect").style.display="none";
  document.getElementById("levelTitle").innerText= NAMES[l-1];
  nextQuestion();
}

function nextQuestion(){
  answered=false;
  currentQ = generateQ(level);
  document.getElementById("feedback").innerText="";
  document.getElementById("nextBtn").style.display="none";
  const area = document.getElementById("questionArea");
  if(currentQ.type === 'tf') {
    area.innerHTML = `<p>Analyze the loop:</p><pre class="code">${highlight(currentQ.code)}</pre>
      <button class="tf-btn tf-true" onclick="check(true)">True</button>
      <button class="tf-btn tf-false" onclick="check(false)">False</button>`;
  } else {
    area.innerHTML = `<p>Find the value:</p><pre class="code">${highlight(currentQ.code)}</pre>
      <input id="ansI" type="text" placeholder="?" onkeypress="if(event.key==='Enter')check()">
      <button class="next-btn" onclick="check()">Check</button>`;
    setTimeout(()=>document.getElementById("ansI").focus(), 50);
  }
}

function check(v){
  if(answered) return;
  let val = (currentQ.type === 'input') ? document.getElementById("ansI").value.trim() : v;
  answered = true;
  if(val === currentQ.ans || val.toString() === currentQ.ans.toString()){
    score++; document.getElementById("score").innerText=score;
    document.getElementById("feedback").style.color="#2ecc71";
    document.getElementById("feedback").innerText="✓ Correct!";
  } else {
    document.getElementById("feedback").style.color="#e74c3c";
    document.getElementById("feedback").innerText="✗ Answer was: "+currentQ.ans;
  }
  document.getElementById("nextBtn").style.display="inline-block";
}

function handleNextStep() {
  if(score >= 40) {
    if(level < 4) unlockedLevels[level] = true;
    alert("Level Complete! Next one is open.");
    goBack();
  } else { nextQuestion(); }
}

function goBack(){ document.getElementById("quiz").style.display="none"; document.getElementById("levelSelect").style.display="block"; renderMenu(); }
function showPin(){ document.getElementById("pinPanel").style.display="block"; }
function checkPin(){ if(document.getElementById("pinInput").value==="1502"){ unlockedLevels=[true,true,true,true]; renderMenu(); document.getElementById("pinPanel").style.display="none"; } }

renderMenu();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Easy Loop Practice</title>
  <style>
    /* Main Design */
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; }
    .container { background: #16213e; max-width: 860px; margin: 20px auto; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #0f3460; }
    h2 { color: #4ecca3; margin-bottom: 20px; }
    
    /* Buttons */
    button { padding: 12px 20px; margin: 8px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .levelBtn { background: #4ecca3; color: #1a1a2e; width: 80%; max-width: 400px; }
    .levelBtn:hover { background: #45b291; transform: translateY(-2px); }
    .locked { background: #454d66; color: #a0a0a0; cursor: not-allowed; }
    
    /* Syntax Highlighting (Dark Background) */
    pre.code { 
        background: #000000; 
        color: #f8f8f2; 
        padding: 20px; 
        border-radius: 10px; 
        font-family: 'Consolas', 'Monaco', monospace; 
        font-size: 18px; 
        line-height: 1.6; 
        text-align: left; 
        margin: 20px auto; 
        max-width: 600px; 
        overflow-x: auto; 
        border: 2px solid #4ecca3;
    }
    .keyword { color: #ff79c6; } /* for, while, int */
    .number { color: #bd93f9; }  /* 1, 2, 3 */
    .variable { color: #50fa7b; } /* i, sum, n */
    .comment { color: #6272a4; }

    /* Inputs */
    input[type="text"], input[type="password"] { padding: 12px; font-size: 18px; width: 200px; border: 2px solid #4ecca3; border-radius: 8px; background: #0f3460; color: white; outline: none; }
    #feedback { font-size: 22px; font-weight: bold; margin: 15px 0; min-height: 30px; }
    
    .tf-btn { font-size: 20px; padding: 15px 45px; margin: 10px; }
    .tf-true { background: #2ecc71; color: white; }
    .tf-false { background: #e74c3c; color: white; }
    .next-btn { background: #4ecca3; color: #1a1a2e; }
    .back-btn { background: #533483; color: white; }
    #pinPanel { display:none; background:#0f3460; padding:20px; border-radius:10px; border: 1px dashed #4ecca3; margin-top:20px; }
  </style>
</head>
<body>

<div class="container">
  <h2>🔁 Easy Loop Fun!</h2>

  <div id="levelSelect">
    <h3>Choose a Challenge</h3>
    <button class="levelBtn" onclick="selectLevel(1)">Level 1 — Is it true?</button><br>
    <button class="levelBtn locked" id="btn2" onclick="selectLevel(2)">🔒 Level 2 — Adding Up</button><br>
    <button class="levelBtn locked" id="btn3" onclick="selectLevel(3)">🔒 Level 3 — Double Loops</button><br>
    <button class="levelBtn locked" id="btn4" onclick="selectLevel(4)">🔒 Level 4 — Giant Challenge</button>
    <p style="color:#a0a0a0; font-size:14px; margin-top:15px;">Get 5 points to unlock the next level!</p>
    <button style="background:transparent; color:#4ecca3; font-size:12px;" onclick="showPin()">Teacher Login</button>
    <div id="pinPanel">
      <p>Enter Teacher PIN:</p>
      <input id="pinInput" type="password" placeholder="PIN">
      <button class="levelBtn" style="width:auto" onclick="checkPin()">Unlock</button>
    </div>
  </div>

  <div id="quiz" style="display:none">
    <h3 id="levelTitle" style="color:#4ecca3"></h3>
    <div id="questionArea"></div>
    <div id="feedback"></div>
    <div style="font-size:18px; margin:10px;">Stars: <span id="score" style="color:#f1c40f">0</span> ⭐</div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display:none">Next Question →</button><br>
    <button class="back-btn" onclick="goBack()">Exit</button>
  </div>
</div>

<script>
let level=1, score=0, answered=false, qIdx=0, requestedLevel=null;
let unlockedLevels=[true,false,false,false];

// Helper to wrap code in colored spans
function highlight(code) {
  return code
    .replace(/\b(int|for|while|if|return)\b/g, '<span class="keyword">$1</span>')
    .replace(/\b(\d+)\b/g, '<span class="number">$1</span>')
    .replace(/\b(i|j|sum|n|count|total|x)\b/g, '<span class="variable">$1</span>');
}

function showPin(){ document.getElementById("pinPanel").style.display="block"; requestedLevel=2; }

function checkPin(){
  const pin=document.getElementById("pinInput").value;
  if(pin==="1502"){
    unlockedLevels=[true,true,true,true];
    alert("All levels unlocked, Teacher!");
    location.reload(); // Simplest way to refresh the UI buttons
  } else { alert("Wrong PIN!"); }
}

function selectLevel(l){
  if(!unlockedLevels[l-1]){ alert("Finish the previous level first!"); return; }
  startQuiz(l);
}

function startQuiz(l){
  level=l; score=0; qIdx=0;
  document.getElementById("score").innerText=0;
  document.getElementById("quiz").style.display="block";
  document.getElementById("levelSelect").style.display="none";
  document.getElementById("levelTitle").innerText= ["Is it True?","Adding Up","Double Loops","Giant Challenge"][l-1];
  nextQuestion();
}

function goBack(){ location.reload(); }

function nextQuestion(){
  answered=false;
  document.getElementById("feedback").innerText="";
  document.getElementById("nextBtn").style.display="none";
  if(level===1) showL1(); 
  else if(level===2) showL2(); 
  else if(level===3) showL3(); 
  else showL4();
}

function onCorrect(){
  score++; document.getElementById("score").innerText=score;
  document.getElementById("feedback").style.color="#2ecc71";
  document.getElementById("feedback").innerText="✨ Great Job! ✨";
  document.getElementById("nextBtn").style.display="inline-block";
  if(score>=5) unlockNext();
}

function onWrong(ans){
  document.getElementById("feedback").style.color="#e74c3c";
  document.getElementById("feedback").innerText="Not quite! The answer was: "+ans;
  document.getElementById("nextBtn").style.display="inline-block";
}

function unlockNext(){
  if(level<4) unlockedLevels[level]=true;
}

// --- LEVEL DATA (Simplified for Grade 3) ---

function showL1(){
  const questions = [
    {code:"int i = 0;\nwhile(i < 2) {\n  i = i + 1;\n}\n// Is i equal to 2?", ans:true},
    {code:"int n = 5;\nif(n > 10)", ans:false},
    {code:"int i = 1;\nwhile(i < 3) {\n  i = i + 1;\n}\n// Is i equal to 5?", ans:false}
  ];
  let q = questions[qIdx % questions.length]; qIdx++;
  document.getElementById("questionArea").innerHTML = `
    <p>Look at the code. Is the final answer True or False?</p>
    <pre class="code">${highlight(q.code)}</pre>
    <button class="tf-btn tf-true" onclick="checkL1(true)">True</button>
    <button class="tf-btn tf-false" onclick="checkL1(false)">False</button>
  `;
  window.currentAns = q.ans;
}
function checkL1(v){ if(answered)return; answered=true; v===window.currentAns ? onCorrect() : onWrong(window.currentAns); }

function showL2(){
  const questions = [
    {code:"int sum = 0;\nfor(int i=0; i<3; i++) {\n  sum = sum + 1;\n}\nreturn sum;", ans:"3"},
    {code:"int n = 1;\nwhile(n < 4) {\n  n = n + 1;\n}\nreturn n;", ans:"4"},
    {code:"int count = 2;\ncount = count + 2;\nreturn count;", ans:"4"}
  ];
  let q = questions[qIdx % questions.length]; qIdx++;
  renderInputQ(q);
}

function showL3(){
  const questions = [
    {code:"int n = 0;\nfor(int i=0; i<2; i++) {\n  for(int j=0; j<2; j++) {\n    n = n + 1;\n  }\n}\nreturn n;", ans:"4"},
    {code:"int x = 5;\nfor(int i=0; i<2; i++) {\n  x = x + 1;\n}\nreturn x;", ans:"7"}
  ];
  let q = questions[qIdx % questions.length]; qIdx++;
  renderInputQ(q);
}

function showL4(){
  const questions = [
    {code:"int sum = 10;\nwhile(sum < 12) {\n  sum = sum + 1;\n}\nreturn sum;", ans:"12"},
    {code:"int count = 0;\nfor(int i=0; i<5; i++) {\n  count = count + 1;\n}\nreturn count;", ans:"5"}
  ];
  let q = questions[qIdx % questions.length]; qIdx++;
  renderInputQ(q);
}

function renderInputQ(q){
  document.getElementById("questionArea").innerHTML = `
    <p>What is the final number?</p>
    <pre class="code">${highlight(q.code)}</pre>
    <input id="ansInput" type="text" placeholder="?">
    <button class="next-btn" onclick="checkInputQ()">Check</button>
  `;
  window.currentAns = q.ans;
}

function checkInputQ(){
  if(answered) return;
  let val = document.getElementById("ansInput").value.trim();
  answered=true;
  val == window.currentAns ? onCorrect() : onWrong(window.currentAns);
}
</script>
</body>
</html>
